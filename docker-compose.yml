version: '3.9'

services:
  neo4j:
    image: neo4j:5.25-community
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - '7474:7474'   # Browser UI
      - '7687:7687'   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:7474']
      interval: 10s
      retries: 10

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    volumes:
      - ./backend/data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  neo4j_data:
